<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Лекц №7 ба Дасгал №2</title>
    
</head>
<body>

    <div class="section">
        <h2>№2: Тоо таах тоглоом</h2>
        <button onclick="random()">Санамсаргүй тоо харах</button>
        <h2 id="result" style="height: 30px; color: red;"></h2>
        
        <p>Тоог оруулна уу:</p>
        <input type="text" id="check" placeholder="Тоогоо бичнэ үү" />
        <button onclick="shalgah()">Шалгах</button>
    </div>

    <div class="section">
        <h2>Лекц №7: Шоо орхих</h2>
        <button id="btn">Шоог дарах (6 удаа)</button>
        <h1 id="shooToo">0</h1>
        <img id="shooZurag" src="shoo1.webp" alt="Шоо" />
    </div>

    <script>
        // --- №2 Кодын логик ---
        let num = 0;

        function random() {
            num = Math.floor(Math.random() * (20000 - 10000 + 1)) + 10000;
            document.getElementById("result").innerHTML = num;
            
            setTimeout(function () {
                document.getElementById("result").innerHTML = "";
            }, 100); 
        }

        function shalgah() {
            let inputVal = document.getElementById("check").value;
            if (Number(inputVal) == num) {
                alert("Зөв байна.");
            } else {
                alert("Буруу тоо байна. Зөв хариу: " + num);
            }
            document.getElementById("check").value = "";
        }

        // --- Лекц №7 Кодын логик ---
        let zurag = document.getElementById("shooZurag");
        let btn = document.getElementById("btn");
        let too = document.getElementById("shooToo");
        
        let sum = Number(localStorage.getItem("nemeh")) || 0;
        too.innerHTML = "Нийлбэр: " + sum;
        
        let count = 0;

        btn.addEventListener("click", function () {
            if (count < 6) {
                let randomToo = Math.floor(Math.random() * 6) + 1;
                sum += randomToo;
                
                // Зургийг солих хэсэг: shoo1.png, shoo2.png ... гэх мэт хайна
                zurag.src = "shoo" + randomToo + ".webp";
                
                too.innerHTML = "Нийлбэр: " + sum;
                localStorage.setItem("nemeh", sum);
                count++;

                if (count == 6) {
                    btn.style.display = "none";
                    alert("Шоог 6 удаа орхиж дууслаа!");
                }
            }
        });
    </script>

</body>
</html>
